<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Racing Simulator – Hockenheim</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;touch-action:none;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif}
#game{position:fixed;inset:0;width:100vw;height:100vh;display:block}
#menu{position:fixed;inset:0;background:linear-gradient(180deg,#0a0a0a,#1a1a1a);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;padding:20px;z-index:100}
#menu h1{font-size:2.2em;font-weight:200;letter-spacing:.35em;margin-bottom:.3em;text-transform:uppercase}
#menu .sub{font-size:.8em;color:#888;margin-bottom:2em;letter-spacing:.3em;text-transform:uppercase}
.option-group{margin:14px 0;text-align:center}
.option-label{color:#aaa;font-size:.75em;letter-spacing:.2em;margin-bottom:10px;text-transform:uppercase}
.option-buttons{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.opt-btn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.18);color:#fff;padding:11px 22px;font-size:.9em;border-radius:8px;cursor:pointer;min-width:75px;-webkit-tap-highlight-color:transparent;font-family:inherit}
.opt-btn.active{background:rgba(255,255,255,.95);color:#000;border-color:#fff}
#start-btn{margin-top:28px;padding:16px 58px;font-size:1em;background:#fff;color:#000;border:none;border-radius:50px;cursor:pointer;letter-spacing:.35em;font-weight:500;text-transform:uppercase;font-family:inherit}
#start-btn:active{transform:scale(.97)}
#hud{position:fixed;top:0;left:0;right:0;padding:14px 18px;color:#fff;pointer-events:none;display:none;z-index:10}
#hud.active{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.hud-panel{background:rgba(0,0,0,.55);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);padding:8px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.1)}
.hud-label{font-size:.6em;color:#aaa;letter-spacing:.2em;text-transform:uppercase}
.hud-value{font-size:1.2em;font-weight:500;font-variant-numeric:tabular-nums}
#speed{font-size:2.2em;text-align:center;line-height:1}
#speed-unit{font-size:.28em;color:#888;display:block;letter-spacing:.25em;margin-top:2px}
#controls{position:fixed;bottom:0;left:0;right:0;height:45%;display:none;pointer-events:none;z-index:5}
#controls.active{display:block}
.ctrl{position:absolute;width:82px;height:82px;background:rgba(255,255,255,.12);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1.5px solid rgba(255,255,255,.3);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:2em;font-weight:200;pointer-events:auto;-webkit-tap-highlight-color:transparent}
.ctrl.pressed{background:rgba(255,255,255,.35);transform:scale(.94)}
.ctrl.gas{background:rgba(0,180,60,.18);border-color:rgba(0,255,100,.55)}
.ctrl.gas.pressed{background:rgba(0,220,80,.55)}
.ctrl.brake{background:rgba(220,30,30,.18);border-color:rgba(255,70,70,.55)}
.ctrl.brake.pressed{background:rgba(240,60,60,.55)}
#left-btn{left:18px;bottom:26px}
#right-btn{left:115px;bottom:26px}
#brake-btn{right:115px;bottom:26px}
#gas-btn{right:18px;bottom:26px}
#countdown{position:fixed;inset:0;display:none;align-items:center;justify-content:center;color:#fff;font-size:9em;font-weight:100;pointer-events:none;z-index:20;text-shadow:0 4px 40px rgba(0,0,0,.9)}
#countdown.active{display:flex}
#finish{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(15px);-webkit-backdrop-filter:blur(15px);display:none;flex-direction:column;align-items:center;justify-content:center;color:#fff;z-index:50;padding:20px}
#finish.active{display:flex}
#finish h2{font-size:1.6em;font-weight:200;letter-spacing:.35em;margin-bottom:24px;text-transform:uppercase}
#finish-stats{background:rgba(255,255,255,.05);padding:16px 24px;border-radius:12px;border:1px solid rgba(255,255,255,.15);margin-bottom:24px;min-width:260px}
.stat-row{display:flex;justify-content:space-between;padding:7px 0;gap:30px;border-bottom:1px solid rgba(255,255,255,.08)}
.stat-row:last-child{border:none}
.stat-label{color:#aaa;font-size:.8em;letter-spacing:.12em;text-transform:uppercase}
.stat-value{font-variant-numeric:tabular-nums;font-weight:500}
#reset-btn{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.65);backdrop-filter:blur(10px);color:#fff;border:1px solid rgba(255,255,255,.22);padding:6px 16px;border-radius:20px;font-size:.7em;display:none;z-index:8;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;font-family:inherit}
#reset-btn.active{display:block}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="menu">
  <h1>Racing</h1>
  <div class="sub">Hockenheim Sim</div>
  <div class="option-group">
    <div class="option-label">Gegner</div>
    <div class="option-buttons" id="opp-opts">
      <button class="opt-btn active" data-val="0">Allein</button>
      <button class="opt-btn" data-val="2">2 Gegner</button>
      <button class="opt-btn" data-val="4">4 Gegner</button>
    </div>
  </div>
  <div class="option-group">
    <div class="option-label">Runden</div>
    <div class="option-buttons" id="lap-opts">
      <button class="opt-btn" data-val="2">2</button>
      <button class="opt-btn active" data-val="3">3</button>
      <button class="opt-btn" data-val="5">5</button>
    </div>
  </div>
  <button id="start-btn">Start</button>
</div>
<div id="hud">
  <div class="hud-panel"><div class="hud-label">Runde</div><div class="hud-value" id="lap-count">1 / 3</div></div>
  <div class="hud-panel" style="text-align:center;padding:4px 16px"><div id="speed">0</div><div id="speed-unit">km/h</div></div>
  <div class="hud-panel" style="text-align:right;min-width:115px"><div class="hud-label">Aktuell</div><div class="hud-value" id="cur-time">0:00.00</div><div class="hud-label" style="margin-top:4px">Beste</div><div class="hud-value" id="best-time">--:--.--</div></div>
</div>
<div id="controls">
  <div class="ctrl" id="left-btn">‹</div>
  <div class="ctrl" id="right-btn">›</div>
  <div class="ctrl brake" id="brake-btn">◉</div>
  <div class="ctrl gas" id="gas-btn">▶</div>
</div>
<div id="countdown"></div>
<div id="finish">
  <h2>Rennen beendet</h2>
  <div id="finish-stats"></div>
  <button id="restart-btn" class="opt-btn" style="padding:13px 40px;letter-spacing:.2em">Zurück zum Menü</button>
</div>
<button id="reset-btn">⟲ Reset</button>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// === Setup ===
const canvas = document.getElementById('game');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x8cb4d8);
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x8cb4d8, 150, 700);
const camera = new THREE.PerspectiveCamera(68, innerWidth/innerHeight, 0.5, 2500);
function onResize(){renderer.setSize(innerWidth, innerHeight); camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();}
addEventListener('resize', onResize);
addEventListener('orientationchange', ()=>setTimeout(onResize,100));
onResize();

scene.add(new THREE.HemisphereLight(0xffffff, 0x4c4c66, 0.9));
const sun = new THREE.DirectionalLight(0xfff0dd, 0.95);
sun.position.set(200,300,150); scene.add(sun);

const ground = new THREE.Mesh(new THREE.PlaneGeometry(4000,4000), new THREE.MeshLambertMaterial({color:0x4e7a3e}));
ground.rotation.x = -Math.PI/2; ground.position.y = -0.05; scene.add(ground);

// === Track ===
const trackControlPoints = [
  new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,70), new THREE.Vector3(0,0,140), new THREE.Vector3(0,0,200),
  new THREE.Vector3(15,0,230), new THREE.Vector3(45,0,250), new THREE.Vector3(85,0,255), new THREE.Vector3(120,0,240),
  new THREE.Vector3(155,0,205), new THREE.Vector3(180,0,155), new THREE.Vector3(195,0,95), new THREE.Vector3(200,0,30), new THREE.Vector3(195,0,-30),
  new THREE.Vector3(175,0,-80), new THREE.Vector3(135,0,-105), new THREE.Vector3(90,0,-100), new THREE.Vector3(60,0,-75), new THREE.Vector3(55,0,-35),
  new THREE.Vector3(65,0,10), new THREE.Vector3(80,0,60), new THREE.Vector3(92,0,110),
  new THREE.Vector3(95,0,155), new THREE.Vector3(75,0,180), new THREE.Vector3(40,0,180),
  new THREE.Vector3(15,0,175), new THREE.Vector3(-15,0,180), new THREE.Vector3(-40,0,155), new THREE.Vector3(-50,0,110),
  new THREE.Vector3(-48,0,55), new THREE.Vector3(-35,0,10), new THREE.Vector3(-15,0,-20), new THREE.Vector3(0,0,-25), new THREE.Vector3(0,0,-10)
];
const trackCurve = new THREE.CatmullRomCurve3(trackControlPoints, true, 'centripetal', 0.5);
const TRACK_WIDTH = 15;
const trackSegments = 500;
const trackPoints = [];
{
  const V=[], I=[], U=[];
  for(let i=0;i<=trackSegments;i++){
    const t=i/trackSegments;
    const p=trackCurve.getPointAt(t);
    const tan=trackCurve.getTangentAt(t);
    const nrm=new THREE.Vector3(-tan.z,0,tan.x).normalize();
    const L=p.clone().addScaledVector(nrm, TRACK_WIDTH/2);
    const R=p.clone().addScaledVector(nrm,-TRACK_WIDTH/2);
    V.push(L.x,0.01,L.z, R.x,0.01,R.z);
    U.push(0,t*80, 1,t*80);
    trackPoints.push({center:p, tangent:tan.clone(), normal:nrm, left:L, right:R});
  }
  for(let i=0;i<trackSegments;i++){const a=i*2,b=a+1,c=a+2,d=a+3; I.push(a,c,b, b,c,d);}
  const g=new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(V,3));
  g.setAttribute('uv', new THREE.Float32BufferAttribute(U,2));
  g.setIndex(I); g.computeVertexNormals();
  scene.add(new THREE.Mesh(g, new THREE.MeshLambertMaterial({color:0x2c2c2e})));
}

// White edge lines
{
  const vL=[], vR=[];
  for(let i=0;i<=trackSegments;i++){
    const pt=trackPoints[i];
    const L=pt.center.clone().addScaledVector(pt.normal, TRACK_WIDTH/2-0.4);
    const R=pt.center.clone().addScaledVector(pt.normal,-(TRACK_WIDTH/2-0.4));
    vL.push(L.x,0.03,L.z); vR.push(R.x,0.03,R.z);
  }
  const gL=new THREE.BufferGeometry(); gL.setAttribute('position', new THREE.Float32BufferAttribute(vL,3));
  const gR=new THREE.BufferGeometry(); gR.setAttribute('position', new THREE.Float32BufferAttribute(vR,3));
  const m=new THREE.LineBasicMaterial({color:0xffffff});
  scene.add(new THREE.Line(gL,m)); scene.add(new THREE.Line(gR,m));
}

// Red/white kerbs at corners
{
  const V=[], C=[], I=[];
  for(let i=0;i<trackSegments;i++){
    const t1=i/trackSegments, t2=((i+3)%trackSegments)/trackSegments;
    const a=trackCurve.getTangentAt(t1), b=trackCurve.getTangentAt(t2);
    const turn=a.angleTo(b);
    if(turn<0.018) continue;
    const cY=a.z*b.x-a.x*b.z;
    const inside=cY>0?1:-1;
    const p=trackPoints[i], pn=trackPoints[i+1];
    const C1=p.center.clone().addScaledVector(p.normal,(TRACK_WIDTH/2-0.15)*inside);
    const K1=p.center.clone().addScaledVector(p.normal,(TRACK_WIDTH/2+1.1)*inside);
    const C2=pn.center.clone().addScaledVector(pn.normal,(TRACK_WIDTH/2-0.15)*inside);
    const K2=pn.center.clone().addScaledVector(pn.normal,(TRACK_WIDTH/2+1.1)*inside);
    const base=V.length/3;
    V.push(C1.x,0.05,C1.z, K1.x,0.05,K1.z, C2.x,0.05,C2.z, K2.x,0.05,K2.z);
    const red=Math.floor(i/3)%2===0;
    const col=red?[0.85,0.12,0.12]:[1,1,1];
    for(let k=0;k<4;k++) C.push(...col);
    I.push(base,base+1,base+2, base+1,base+3,base+2);
  }
  if(V.length){
    const g=new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.Float32BufferAttribute(V,3));
    g.setAttribute('color', new THREE.Float32BufferAttribute(C,3));
    g.setIndex(I); g.computeVertexNormals();
    scene.add(new THREE.Mesh(g, new THREE.MeshBasicMaterial({vertexColors:true})));
  }
}

// Start/Finish line
{
  const c=document.createElement('canvas'); c.width=c.height=64;
  const x=c.getContext('2d');
  for(let y=0;y<8;y++) for(let xx=0;xx<8;xx++){ x.fillStyle=(xx+y)%2?'#fff':'#000'; x.fillRect(xx*8,y*8,8,8); }
  const t=new THREE.CanvasTexture(c); t.magFilter=THREE.NearestFilter;
  const sf=new THREE.Mesh(new THREE.PlaneGeometry(TRACK_WIDTH,3.5), new THREE.MeshBasicMaterial({map:t}));
  sf.rotation.x=-Math.PI/2; sf.position.set(0,0.04,0); scene.add(sf);
}

// Armco barriers
{
  const wMat=new THREE.MeshLambertMaterial({color:0xeeeeee});
  const rMat=new THREE.MeshLambertMaterial({color:0xcc2020});
  const pMat=new THREE.MeshLambertMaterial({color:0x555555});
  const step=6;
  for(let i=0;i<trackSegments;i+=step){
    const pt=trackPoints[i];
    const next=trackPoints[Math.min(i+step,trackSegments)];
    for(const side of [1,-1]){
      const off=TRACK_WIDTH/2+2.2;
      const p1=pt.center.clone().addScaledVector(pt.normal,off*side);
      const p2=next.center.clone().addScaledVector(next.normal,off*side);
      const ctr=p1.clone().add(p2).multiplyScalar(0.5);
      const len=p2.clone().sub(p1).length();
      const mat=(Math.floor(i/step))%3===0?rMat:wMat;
      const bar=new THREE.Mesh(new THREE.BoxGeometry(0.2,0.85,Math.max(0.5,len)), mat);
      bar.position.set(ctr.x,0.42,ctr.z);
      bar.lookAt(p2.x,0.42,p2.z);
      scene.add(bar);
      const post=new THREE.Mesh(new THREE.BoxGeometry(0.18,1.0,0.18), pMat);
      post.position.set(p1.x,0.5,p1.z);
      scene.add(post);
    }
  }
}

// Crowd texture
function createCrowdTex(){
  const c=document.createElement('canvas'); c.width=256; c.height=64;
  const x=c.getContext('2d');
  x.fillStyle='#555'; x.fillRect(0,0,256,64);
  const cols=['#2e5a86','#9e2b2b','#c8a836','#6a7d88','#3a3a6a','#a87d4c','#5a5a5a'];
  for(let i=0;i<450;i++){
    x.fillStyle=cols[Math.floor(Math.random()*cols.length)];
    x.fillRect(Math.random()*256, Math.random()*64, 3+Math.random()*3, 3+Math.random()*3);
  }
  const t=new THREE.CanvasTexture(c);
  t.wrapS=t.wrapT=THREE.RepeatWrapping;
  return t;
}
const crowdTex=createCrowdTex();

// Grandstand
function buildGrandstand(width, height){
  const g=new THREE.Group();
  const depth=height*1.4;
  const tex=crowdTex.clone(); tex.needsUpdate=true;
  tex.repeat.set(Math.max(2,width/5), Math.max(2,height/2));
  const crowdMat=new THREE.MeshLambertMaterial({map:tex, side:THREE.DoubleSide});
  const crowd=new THREE.Mesh(new THREE.PlaneGeometry(width, Math.sqrt(height*height+depth*depth)), crowdMat);
  const angle=Math.atan2(height, depth);
  crowd.rotation.x=-angle-Math.PI/2;
  crowd.position.set(0, height/2, -depth/2+0.1);
  g.add(crowd);
  const supp=new THREE.MeshLambertMaterial({color:0xdddddd});
  const back=new THREE.Mesh(new THREE.BoxGeometry(width, height+0.5, 0.4), supp);
  back.position.set(0,(height+0.5)/2, 0.3); g.add(back);
  const colCount=Math.max(3, Math.floor(width/8));
  for(let i=0;i<=colCount;i++){
    const col=new THREE.Mesh(new THREE.BoxGeometry(0.35, height+2.2, 0.35), supp);
    col.position.set(-width/2+(width*i/colCount), (height+2.2)/2, 0.3);
    g.add(col);
  }
  const roof=new THREE.Mesh(new THREE.BoxGeometry(width+1, 0.35, depth+1.5),
    new THREE.MeshLambertMaterial({color:0x4a4a4e}));
  roof.position.set(0, height+2.2, -depth/2+0.5); g.add(roof);
  return g;
}

function placeGrandstand(idx, w, h, sideSign){
  const pt=trackPoints[idx];
  const standoff=TRACK_WIDTH/2+9;
  const pos=pt.center.clone().addScaledVector(pt.normal, standoff*sideSign);
  const gs=buildGrandstand(w, h);
  gs.position.set(pos.x, 0, pos.z);
  const toTrack=pt.center.clone().sub(pos);
  gs.rotation.y=Math.atan2(toTrack.x, toTrack.z);
  scene.add(gs);
}
placeGrandstand(20, 45, 8, -1);
placeGrandstand(50, 32, 6, -1);
placeGrandstand(360, 30, 7, 1);
placeGrandstand(400, 35, 7, -1);
placeGrandstand(180, 28, 5, -1);

// Trees
{
  const trGeo=new THREE.CylinderGeometry(0.22,0.32,1.6,6);
  const tpGeo=new THREE.ConeGeometry(1.8,3.4,8);
  const trMat=new THREE.MeshLambertMaterial({color:0x4a3526});
  const leMat=new THREE.MeshLambertMaterial({color:0x2c5a2c});
  for(let i=0;i<trackPoints.length;i+=7){
    const pt=trackPoints[i];
    for(const side of [1,-1]){
      if(Math.random()<0.55){
        const off=30+Math.random()*35;
        const jit=(Math.random()-0.5)*10;
        const pos=pt.center.clone().addScaledVector(pt.normal, off*side);
        pos.x+=pt.tangent.x*jit; pos.z+=pt.tangent.z*jit;
        const g=new THREE.Group();
        const tr=new THREE.Mesh(trGeo, trMat); tr.position.y=0.8; g.add(tr);
        const tp=new THREE.Mesh(tpGeo, leMat); tp.position.y=3.2; g.add(tp);
        g.position.set(pos.x,0,pos.z);
        g.rotation.y=Math.random()*Math.PI;
        const s=0.85+Math.random()*0.55; g.scale.set(s,s,s);
        scene.add(g);
      }
    }
  }
}

// === Detailed Porsche-inspired car ===
function buildCarMesh(color=0x050505, isPlayer=false){
  const g=new THREE.Group();
  const bodyMat=isPlayer
    ? new THREE.MeshPhongMaterial({color:0x050505, shininess:120, specular:0x222222})
    : new THREE.MeshPhongMaterial({color, shininess:80, specular:0x1a1a1a});
  const darkMat=new THREE.MeshLambertMaterial({color:0x0a0a0a});
  const glassMat=new THREE.MeshPhongMaterial({color:0x0e1218, transparent:true, opacity:0.72, shininess:120, specular:0x555555});
  const rimMat=new THREE.MeshPhongMaterial({color:0x6a6a70, shininess:180, specular:0xaaaaaa});
  const tireMat=new THREE.MeshLambertMaterial({color:0x181818});
  const lightMat=new THREE.MeshBasicMaterial({color:0xfff3cc});
  const redMat=new THREE.MeshBasicMaterial({color:0xbb1010});
  const brakeMat=new THREE.MeshBasicMaterial({color:0xcc2828});
  const chromeMat=new THREE.MeshPhongMaterial({color:0x999999, shininess:220, specular:0xcccccc});

  const bodyGeo=new THREE.BoxGeometry(1.92, 0.58, 4.35);
  {
    const p=bodyGeo.attributes.position;
    for(let i=0;i<p.count;i++){
      const z=p.getZ(i);
      if(z>2.0) p.setX(i, p.getX(i)*0.94);
      if(z<-2.0) p.setX(i, p.getX(i)*0.97);
    }
    p.needsUpdate=true;
  }
  const body=new THREE.Mesh(bodyGeo, bodyMat); body.position.y=0.55; g.add(body);

  const hood=new THREE.Mesh(new THREE.BoxGeometry(1.75,0.1,1.15), bodyMat);
  hood.position.set(0,0.87,1.35); g.add(hood);

  const cabinGeo=new THREE.BoxGeometry(1.58,0.55,1.95);
  {
    const p=cabinGeo.attributes.position;
    for(let i=0;i<p.count;i++){
      const y=p.getY(i), z=p.getZ(i);
      if(y>0){
        p.setX(i, p.getX(i)*0.86);
        if(z<-0.3) p.setZ(i, z*0.8);
      }
    }
    p.needsUpdate=true;
  }
  const cabin=new THREE.Mesh(cabinGeo, bodyMat);
  cabin.position.set(0,1.06,-0.2); g.add(cabin);

  const ws=new THREE.Mesh(new THREE.BoxGeometry(1.46,0.55,0.05), glassMat);
  ws.position.set(0,1.12,0.74); ws.rotation.x=-0.48; g.add(ws);
  const rw=new THREE.Mesh(new THREE.BoxGeometry(1.38,0.5,0.05), glassMat);
  rw.position.set(0,1.14,-1.08); rw.rotation.x=0.55; g.add(rw);
  const sGeo=new THREE.BoxGeometry(0.04,0.36,1.6);
  const sL=new THREE.Mesh(sGeo, glassMat); sL.position.set(0.81,1.12,-0.15); g.add(sL);
  const sR=new THREE.Mesh(sGeo, glassMat); sR.position.set(-0.81,1.12,-0.15); g.add(sR);

  const rearSlope=new THREE.Mesh(new THREE.BoxGeometry(1.78,0.3,1.4), bodyMat);
  rearSlope.position.set(0,0.96,-1.32); rearSlope.rotation.x=-0.2; g.add(rearSlope);
  const deck=new THREE.Mesh(new THREE.BoxGeometry(1.78,0.08,0.72), bodyMat);
  deck.position.set(0,1.02,-1.72); g.add(deck);
  const spoiler=new THREE.Mesh(new THREE.BoxGeometry(1.7,0.07,0.28), bodyMat);
  spoiler.position.set(0,1.14,-1.88); spoiler.rotation.x=-0.1; g.add(spoiler);

  const flareMat=new THREE.MeshPhongMaterial({color:0x030303, shininess:50});
  [[0.9,1.3],[-0.9,1.3],[0.95,-1.3],[-0.95,-1.3]].forEach(([x,z])=>{
    const f=new THREE.Mesh(new THREE.BoxGeometry(0.36,0.38,1.1), flareMat);
    f.position.set(x,0.55,z); g.add(f);

  function createWheel(){
    const wg=new THREE.Group();
    const tg=new THREE.CylinderGeometry(0.42,0.42,0.3,22); tg.rotateZ(Math.PI/2);
    wg.add(new THREE.Mesh(tg, tireMat));
    const rg=new THREE.CylinderGeometry(0.32,0.32,0.32,20); rg.rotateZ(Math.PI/2);
    wg.add(new THREE.Mesh(rg, rimMat));
    const hg=new THREE.CylinderGeometry(0.08,0.08,0.34,10); hg.rotateZ(Math.PI/2);
    wg.add(new THREE.Mesh(hg, new THREE.MeshLambertMaterial({color:0x222222})));
    const cal=new THREE.Mesh(new THREE.BoxGeometry(0.1,0.18,0.16), brakeMat);
    cal.position.set(0,0.1,0.22); wg.add(cal);
    return wg;
  }
  const wpos=[[0.92,0.42,1.3],[-0.92,0.42,1.3],[0.96,0.42,-1.3],[-0.96,0.42,-1.3]];
  const wheels=[];
  wpos.forEach(p=>{const w=createWheel(); w.position.set(...p); g.add(w); wheels.push(w);});

  const hlGeo=new THREE.SphereGeometry(0.2,14,12);
  [[-0.6,0.72],[0.6,0.72]].forEach(([x,y])=>{
    const hh=new THREE.Mesh(new THREE.SphereGeometry(0.24,14,12),
      new THREE.MeshPhongMaterial({color:0x0a0a0a, shininess:100}));
    hh.position.set(x,y,2.06); hh.scale.set(1,1,0.35); g.add(hh);
    const hl=new THREE.Mesh(hlGeo, lightMat);
    hl.position.set(x,y,2.12); hl.scale.set(1,1,0.4); g.add(hl);
  });

  const bumper=new THREE.Mesh(new THREE.BoxGeometry(1.86,0.24,0.3), bodyMat);
  bumper.position.set(0,0.33,2.08); g.add(bumper);
  [[-0.55,0.28],[0.55,0.28]].forEach(([x,y])=>{
    const it=new THREE.Mesh(new THREE.BoxGeometry(0.48,0.16,0.12), darkMat);
    it.position.set(x,y,2.19); g.add(it);
  });
  const splitter=new THREE.Mesh(new THREE.BoxGeometry(1.82,0.05,0.22),
    new THREE.MeshPhongMaterial({color:0x020202, shininess:30}));
  splitter.position.set(0,0.16,2.16); g.add(splitter);

  const rbump=new THREE.Mesh(new THREE.BoxGeometry(1.86,0.24,0.3), bodyMat);
  rbump.position.set(0,0.33,-2.08); g.add(rbump);
  const rlBar=new THREE.Mesh(new THREE.BoxGeometry(1.54,0.08,0.04), redMat);
  rlBar.position.set(0,0.82,-2.2); g.add(rlBar);
  const diff=new THREE.Mesh(new THREE.BoxGeometry(1.3,0.14,0.22), darkMat);
  diff.position.set(0,0.18,-2.18); g.add(diff);

  const exGeo=new THREE.CylinderGeometry(0.07,0.07,0.12,12); exGeo.rotateX(Math.PI/2);
  [-0.5,-0.28,0.28,0.5].forEach(x=>{
    const e=new THREE.Mesh(exGeo, chromeMat); e.position.set(x,0.28,-2.2); g.add(e);
  });

  [0.99,-0.99].forEach(x=>{
    const m=new THREE.Mesh(new THREE.BoxGeometry(0.14,0.1,0.18), bodyMat);
    m.position.set(x,1.02,0.56); g.add(m);
  });

  g.userData={wheels};
  return g;
}

// === Car physics ===
class Car {
  constructor(color, startPos, startHeading){
    this.mesh=buildCarMesh(color, true);
    this.mesh.position.copy(startPos);
    this.mesh.rotation.y=startHeading;
    scene.add(this.mesh);
    this.pos=startPos.clone();
    this.heading=startHeading;
    this.speed=0; this.steering=0;
    this.maxSteer=0.45; this.maxSpeed=85;
    this.accel=11; this.brake=28;
    this.coastDrag=1.5; this.wheelbase=2.7;
  }
  update(dt, input){
    let si=0;
    if(input.left) si-=1;
    if(input.right) si+=1;
    const th=input.gas?1:0, br=input.brake?1:0;
    const sf=Math.min(1, Math.abs(this.speed)/this.maxSpeed);
    const ms=this.maxSteer*(1-sf*0.82);
    const ts=si*ms;
    this.steering+=(ts-this.steering)*Math.min(1, dt*4.5);
    if(br>0){ this.speed-=this.brake*br*dt; if(this.speed<0) this.speed=0; }
    else if(th>0){
      const pw=this.accel*(1-sf*0.82);
      this.speed+=pw*th*dt;
      if(this.speed>this.maxSpeed) this.speed=this.maxSpeed;
    } else {
      this.speed=Math.max(0, this.speed-this.coastDrag*dt);
    }
    if(this.speed>0.3){
      const tr=(this.speed*Math.tan(this.steering))/this.wheelbase;
      this.heading+=tr*dt;
    }
    this.pos.x+=Math.sin(this.heading)*this.speed*dt;
    this.pos.z+=Math.cos(this.heading)*this.speed*dt;
    this.mesh.position.copy(this.pos);
    this.mesh.rotation.y=this.heading;
    const rollT=-this.steering*0.1*sf;
    const pitchT=br*0.035-(th>0?0.008:0);
    this.mesh.rotation.z=THREE.MathUtils.lerp(this.mesh.rotation.z, rollT, 0.1);
    this.mesh.rotation.x=THREE.MathUtils.lerp(this.mesh.rotation.x, pitchT, 0.1);
    const wh=this.mesh.userData.wheels;
    if(wh){
      const spin=(this.speed*dt)/0.42;
      wh.forEach(w=>w.children.forEach(c=>c.rotation.y-=spin));
      wh[0].rotation.y=this.steering;
      wh[1].rotation.y=this.steering;
    }
  }
}

class AICar {
  constructor(color, startT, skill, lane){
    this.mesh=buildCarMesh(color, false);
    scene.add(this.mesh);
    this.t=startT; this.skill=skill; this.lane=lane;
    this.baseSpeed=0.00042+skill*0.00012;
    this.speedMult=1;
    this.wobble=Math.random()*Math.PI*2;
    this.wobbleSpeed=0.2+Math.random()*0.25;
  }
  update(dt){
    const a=trackCurve.getTangentAt(this.t);
    const b=trackCurve.getTangentAt((this.t+0.012)%1);
    const cv=a.angleTo(b);
    const des=Math.max(0.4, 1-cv*3.2);
    this.speedMult+=(des-this.speedMult)*Math.min(1, dt*2.5);
    this.t=(this.t+this.baseSpeed*this.speedMult*dt*60)%1;
    this.wobble+=dt*this.wobbleSpeed;
    const wl=Math.sin(this.wobble)*0.8;
    const pt=trackCurve.getPointAt(this.t);
    const tan=trackCurve.getTangentAt(this.t);
    const nrm=new THREE.Vector3(-tan.z,0,tan.x).normalize();
    const off=pt.clone().addScaledVector(nrm, this.lane+wl);
    this.mesh.position.set(off.x, 0, off.z);
    this.mesh.rotation.y=Math.atan2(tan.x, tan.z);
    const cY=a.z*b.x-a.x*b.z;
    const sc=cv*Math.sign(cY||1);
    this.mesh.rotation.z=THREE.MathUtils.lerp(this.mesh.rotation.z, -sc*1.3, 0.1);
    const wh=this.mesh.userData.wheels;
    if(wh){
      const spin=this.speedMult*this.baseSpeed*450*dt;
      wh.forEach(w=>w.children.forEach(c=>c.rotation.y-=spin));
    }
  }
}

// Camera
const camPos=new THREE.Vector3();
const camTarget=new THREE.Vector3();
function updateCamera(car, dt){
  const back=new THREE.Vector3(-Math.sin(car.heading)*7.5, 0, -Math.cos(car.heading)*7.5);
  const des=car.pos.clone().add(back); des.y=3.6;
  camPos.lerp(des, Math.min(1, dt*5.5));
  camera.position.copy(camPos);
  const ah=new THREE.Vector3(car.pos.x+Math.sin(car.heading)*6, 1.3, car.pos.z+Math.cos(car.heading)*6);
  camTarget.lerp(ah, Math.min(1, dt*5.5));
  camera.lookAt(camTarget);
}

// Input
const input={left:false, right:false, gas:false, brake:false};
function bindCtrl(id, prop){
  const el=document.getElementById(id);
  const on=e=>{e.preventDefault(); input[prop]=true; el.classList.add('pressed');};
  const off=e=>{e.preventDefault(); input[prop]=false; el.classList.remove('pressed');};
  el.addEventListener('touchstart', on, {passive:false});
  el.addEventListener('touchend', off, {passive:false});
  el.addEventListener('touchcancel', off, {passive:false});
  el.addEventListener('mousedown', on);
  el.addEventListener('mouseup', off);
  el.addEventListener('mouseleave', off);
}
bindCtrl('left-btn','left'); bindCtrl('right-btn','right');
bindCtrl('brake-btn','brake'); bindCtrl('gas-btn','gas');

addEventListener('keydown', e=>{
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A') input.left=true;
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') input.right=true;
  if(e.key==='ArrowUp'||e.key==='w'||e.key==='W') input.gas=true;
  if(e.key==='ArrowDown'||e.key==='s'||e.key==='S') input.brake=true;
});
addEventListener('keyup', e=>{
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A') input.left=false;
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') input.right=false;
  if(e.key==='ArrowUp'||e.key==='w'||e.key==='W') input.gas=false;
  if(e.key==='ArrowDown'||e.key==='s'||e.key==='S') input.brake=false;
});

// State
const state={
  mode:'menu', opponents:0, laps:3, lap:0,
  currentLapStart:0, bestLap:null, lapTimes:[],
  playerCar:null, aiCars:[], lastPlayerT:0
};

function formatTime(s){
  if(s==null) return '--:--.--';
  const m=Math.floor(s/60), sec=Math.floor(s%60), cs=Math.floor((s*100)%100);
  return `${m}:${String(sec).padStart(2,'0')}.${String(cs).padStart(2,'0')}`;
}

function findNearestIdx(pos){
  let best=0, bd=Infinity;
  for(let i=0;i<trackPoints.length;i++){
    const p=trackPoints[i].center;
    const dx=p.x-pos.x, dz=p.z-pos.z;
    const d=dx*dx+dz*dz;
    if(d<bd){bd=d; best=i;}
  }
  return {idx:best, distSq:bd};
}

// Menu handlers
document.querySelectorAll('#opp-opts .opt-btn').forEach(b=>{
  b.addEventListener('click', ()=>{
    document.querySelectorAll('#opp-opts .opt-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    state.opponents=parseInt(b.dataset.val);
  });
});
document.querySelectorAll('#lap-opts .opt-btn').forEach(b=>{
  b.addEventListener('click', ()=>{
    document.querySelectorAll('#lap-opts .opt-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    state.laps=parseInt(b.dataset.val);
  });
});

document.getElementById('start-btn').addEventListener('click', startRace);
document.getElementById('restart-btn').addEventListener('click', ()=>{
  document.getElementById('finish').classList.remove('active');
  document.getElementById('menu').style.display='';
  resetRace();
});
document.getElementById('reset-btn').addEventListener('click', ()=>{
  if(!state.playerCar) return;
  const n=findNearestIdx(state.playerCar.pos);
  const pt=trackPoints[n.idx];
  state.playerCar.pos.copy(pt.center);
  state.playerCar.heading=Math.atan2(pt.tangent.x, pt.tangent.z);
  state.playerCar.speed=0;
});

function resetRace(){
  if(state.playerCar) scene.remove(state.playerCar.mesh);
  state.aiCars.forEach(a=>scene.remove(a.mesh));
  state.playerCar=null;
  state.aiCars=[];
  state.mode='menu';
  state.lap=0;
  state.lapTimes=[];
  state.bestLap=null;
  state.lastPlayerT=0;
}

function startRace(){
  document.getElementById('menu').style.display='none';
  resetRace();

  // Player: pole position, right side, 40m past start line
  const playerPos=new THREE.Vector3(2.5, 0, 40);
  state.playerCar=new Car(0x050505, playerPos, 0);

  // Camera init
  const back=new THREE.Vector3(0, 0, -7.5);
  camPos.copy(playerPos).add(back); camPos.y=3.6;
  camera.position.copy(camPos);
  camTarget.copy(playerPos);

  // AI grid positions (behind player)
  const aiColors=[0xf0f0f0, 0xb71c1c, 0xe6c31a, 0x8a9aa6, 0x4a88b8];
  const gridSpots=[
    {x:-2.5, z:30}, {x:2.5, z:20},
    {x:-2.5, z:10}, {x:2.5, z:0}
  ];
  for(let i=0;i<state.opponents;i++){
    const spot=gridSpots[i];
    const aiPos=new THREE.Vector3(spot.x, 0, spot.z);
    const nr=findNearestIdx(aiPos);
    const t=nr.idx/(trackPoints.length-1);
    const color=aiColors[i%aiColors.length];
    const skill=0.3+i*0.12;
    state.aiCars.push(new AICar(color, t, skill, spot.x));
  }

  // Set initial lastPlayerT to prevent false lap trigger
  const initNr=findNearestIdx(playerPos);
  state.lastPlayerT=initNr.idx/(trackPoints.length-1);

  document.getElementById('hud').classList.add('active');
  document.getElementById('controls').classList.add('active');
  document.getElementById('reset-btn').classList.add('active');

  state.mode='countdown';
  startCountdown();
}

function startCountdown(){
  const cd=document.getElementById('countdown');
  cd.classList.add('active');
  const steps=['3','2','1','GO!'];
  let i=0;
  cd.textContent=steps[0];
  const tick=()=>{
    i++;
    if(i<steps.length){
      cd.textContent=steps[i];
      if(steps[i]==='GO!'){
        state.mode='racing';
        state.currentLapStart=performance.now();
        setTimeout(()=>cd.classList.remove('active'), 700);
      } else {
        setTimeout(tick, 1000);
      }
    }
  };
  setTimeout(tick, 1000);
}

function finishRace(){
  state.mode='finished';
  const fin=document.getElementById('finish');
  const stats=document.getElementById('finish-stats');
  const total=state.lapTimes.reduce((a,b)=>a+b,0);
  let html=`<div class="stat-row"><span class="stat-label">Gesamtzeit</span><span class="stat-value">${formatTime(total)}</span></div>`;
  html+=`<div class="stat-row"><span class="stat-label">Beste Runde</span><span class="stat-value">${formatTime(state.bestLap)}</span></div>`;
  state.lapTimes.forEach((lt, idx)=>{
    html+=`<div class="stat-row"><span class="stat-label">Runde ${idx+1}</span><span class="stat-value">${formatTime(lt)}</span></div>`;
  });
  stats.innerHTML=html;
  fin.classList.add('active');
  document.getElementById('hud').classList.remove('active');
  document.getElementById('controls').classList.remove('active');
  document.getElementById('reset-btn').classList.remove('active');
}

// Main loop
let lastTime=performance.now();
function animate(){
  const now=performance.now();
  const dt=Math.min(0.05, (now-lastTime)/1000);
  lastTime=now;

  if(state.playerCar){
    if(state.mode==='racing'){
      state.playerCar.update(dt, input);
    } else if(state.mode==='countdown'){
      state.playerCar.update(dt, {left:false, right:false, gas:false, brake:true});
    } else {
      state.playerCar.update(dt, {left:false, right:false, gas:false, brake:false});
    }
    updateCamera(state.playerCar, dt);

    const n=findNearestIdx(state.playerCar.pos);
    const dist=Math.sqrt(n.distSq);
    if(dist>TRACK_WIDTH/2+0.5){
      state.playerCar.speed*=Math.pow(0.35, dt);
    }

    if(state.mode==='racing'){
      const curT=n.idx/(trackPoints.length-1);
      if(state.lastPlayerT>0.85 && curT<0.15){
        const lapTime=(now-state.currentLapStart)/1000;
        if(lapTime>5){
          state.lapTimes.push(lapTime);
          if(state.bestLap==null||lapTime<state.bestLap) state.bestLap=lapTime;
          state.currentLapStart=now;
          state.lap++;
          if(state.lap>=state.laps) finishRace();
        }
      }
      state.lastPlayerT=curT;

      document.getElementById('speed').textContent=Math.floor(state.playerCar.speed*3.6);
      document.getElementById('lap-count').textContent=`${Math.min(state.lap+1, state.laps)} / ${state.laps}`;
      document.getElementById('cur-time').textContent=formatTime((now-state.currentLapStart)/1000);
      document.getElementById('best-time').textContent=formatTime(state.bestLap);
    }
  }

  state.aiCars.forEach(ai=>ai.update(dt));

  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
animate();
</script>
