<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Racing Simulator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;touch-action:none;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif}
#game{position:fixed;inset:0;width:100vw;height:100vh;display:block}
#menu{position:fixed;inset:0;background:linear-gradient(180deg,#0a0a0a,#1a1a1a);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;padding:20px;z-index:100;overflow-y:auto}
#menu h1{font-size:2em;font-weight:200;letter-spacing:.35em;margin-bottom:.3em;text-transform:uppercase}
#menu .sub{font-size:.75em;color:#888;margin-bottom:1.8em;letter-spacing:.3em;text-transform:uppercase}
.option-group{margin:10px 0;text-align:center}
.option-label{color:#aaa;font-size:.7em;letter-spacing:.2em;margin-bottom:8px;text-transform:uppercase}
.option-buttons{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.opt-btn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.18);color:#fff;padding:10px 18px;font-size:.85em;border-radius:8px;cursor:pointer;min-width:70px;font-family:inherit}
.opt-btn.active{background:rgba(255,255,255,.95);color:#000;border-color:#fff}
#start-btn{margin-top:22px;padding:14px 50px;font-size:.95em;background:#fff;color:#000;border:none;border-radius:50px;cursor:pointer;letter-spacing:.35em;font-weight:500;text-transform:uppercase;font-family:inherit}
#start-btn:active{transform:scale(.97)}
#hud{position:fixed;top:0;left:0;right:0;padding:12px 16px;color:#fff;pointer-events:none;display:none;z-index:10}
#hud.active{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.hud-panel{background:rgba(0,0,0,.55);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);padding:7px 13px;border-radius:10px;border:1px solid rgba(255,255,255,.1)}
.hud-label{font-size:.55em;color:#aaa;letter-spacing:.2em;text-transform:uppercase}
.hud-value{font-size:1.15em;font-weight:500;font-variant-numeric:tabular-nums}
#speed{font-size:2em;text-align:center;line-height:1}
#speed-unit{font-size:.3em;color:#888;display:block;letter-spacing:.25em;margin-top:2px}
#controls{position:fixed;bottom:0;left:0;right:0;height:45%;display:none;pointer-events:none;z-index:5}
#controls.active{display:block}
.ctrl{position:absolute;width:80px;height:80px;background:rgba(255,255,255,.12);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1.5px solid rgba(255,255,255,.3);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:2em;font-weight:200;pointer-events:auto;-webkit-tap-highlight-color:transparent}
.ctrl.pressed{background:rgba(255,255,255,.35);transform:scale(.94)}
.ctrl.gas{background:rgba(0,180,60,.18);border-color:rgba(0,255,100,.55)}
.ctrl.gas.pressed{background:rgba(0,220,80,.55)}
.ctrl.brake{background:rgba(220,30,30,.18);border-color:rgba(255,70,70,.55)}
.ctrl.brake.pressed{background:rgba(240,60,60,.55)}
#left-btn{left:18px;bottom:26px}
#right-btn{left:112px;bottom:26px}
#brake-btn{right:112px;bottom:26px}
#gas-btn{right:18px;bottom:26px}
#countdown{position:fixed;inset:0;display:none;align-items:center;justify-content:center;color:#fff;font-size:8em;font-weight:100;pointer-events:none;z-index:20;text-shadow:0 4px 40px rgba(0,0,0,.9)}
#countdown.active{display:flex}
#finish{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(15px);-webkit-backdrop-filter:blur(15px);display:none;flex-direction:column;align-items:center;justify-content:center;color:#fff;z-index:50;padding:20px}
#finish.active{display:flex}
#finish h2{font-size:1.5em;font-weight:200;letter-spacing:.35em;margin-bottom:22px;text-transform:uppercase}
#finish-stats{background:rgba(255,255,255,.05);padding:14px 22px;border-radius:12px;border:1px solid rgba(255,255,255,.15);margin-bottom:22px;min-width:260px}
.stat-row{display:flex;justify-content:space-between;padding:6px 0;gap:30px;border-bottom:1px solid rgba(255,255,255,.08)}
.stat-row:last-child{border:none}
.stat-label{color:#aaa;font-size:.75em;letter-spacing:.12em;text-transform:uppercase}
.stat-value{font-variant-numeric:tabular-nums;font-weight:500}
#reset-btn{position:fixed;top:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.65);backdrop-filter:blur(10px);color:#fff;border:1px solid rgba(255,255,255,.22);padding:5px 14px;border-radius:20px;font-size:.65em;display:none;z-index:8;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;font-family:inherit}
#reset-btn.active{display:block}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="menu">
  <h1>Racing</h1>
  <div class="sub">Oval Circuit</div>
  <div class="option-group">
    <div class="option-label">Gegner</div>
    <div class="option-buttons" id="opp-opts">
      <button class="opt-btn active" data-val="0">Allein</button>
      <button class="opt-btn" data-val="2">2</button>
      <button class="opt-btn" data-val="4">4</button>
    </div>
  </div>
  <div class="option-group">
    <div class="option-label">Runden</div>
    <div class="option-buttons" id="lap-opts">
      <button class="opt-btn" data-val="2">2</button>
      <button class="opt-btn active" data-val="3">3</button>
      <button class="opt-btn" data-val="5">5</button>
    </div>
  </div>
  <div class="option-group">
    <div class="option-label">Lenkung</div>
    <div class="option-buttons" id="steer-opts">
      <button class="opt-btn active" data-val="0">Normal</button>
      <button class="opt-btn" data-val="1">Umgekehrt</button>
    </div>
  </div>
  <button id="start-btn">Start</button>
</div>
<div id="hud">
  <div class="hud-panel"><div class="hud-label">Runde</div><div class="hud-value" id="lap-count">1 / 3</div></div>
  <div class="hud-panel" style="text-align:center;padding:3px 15px"><div id="speed">0</div><div id="speed-unit">km/h</div></div>
  <div class="hud-panel" style="text-align:right;min-width:110px"><div class="hud-label">Aktuell</div><div class="hud-value" id="cur-time">0:00.00</div><div class="hud-label" style="margin-top:3px">Beste</div><div class="hud-value" id="best-time">--:--.--</div></div>
</div>
<div id="controls">
  <div class="ctrl" id="left-btn">‹</div>
  <div class="ctrl" id="right-btn">›</div>
  <div class="ctrl brake" id="brake-btn">◉</div>
  <div class="ctrl gas" id="gas-btn">▶</div>
</div>
<div id="countdown"></div>
<div id="finish"><h2>Rennen beendet</h2><div id="finish-stats"></div><button id="restart-btn" class="opt-btn" style="padding:12px 35px;letter-spacing:.2em">Zurück zum Menü</button></div>
<button id="reset-btn">⟲ Reset</button>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// === Setup ===
const canvas=document.getElementById('game');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.outputEncoding=THREE.sRGBEncoding;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.0;
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(65,innerWidth/innerHeight,0.3,3000);
function onResize(){renderer.setSize(innerWidth,innerHeight);camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();}
addEventListener('resize',onResize);
addEventListener('orientationchange',()=>setTimeout(onResize,100));
onResize();

// === Environment map (for car reflections) ===
function createEnvTex(){
  const c=document.createElement('canvas');c.width=1024;c.height=512;
  const x=c.getContext('2d');
  // Sky gradient
  const sky=x.createLinearGradient(0,0,0,256);
  sky.addColorStop(0,'#4a78b8');sky.addColorStop(0.7,'#a8c5e0');sky.addColorStop(1,'#d4dce5');
  x.fillStyle=sky;x.fillRect(0,0,1024,256);
  // Soft clouds
  x.fillStyle='rgba(255,255,255,0.3)';
  for(let i=0;i<15;i++){
    const cx=Math.random()*1024,cy=30+Math.random()*180,r=20+Math.random()*60;
    x.beginPath();x.ellipse(cx,cy,r,r*0.35,0,0,Math.PI*2);x.fill();
  }
  // Horizon band (bright)
  const hz=x.createLinearGradient(0,240,0,268);
  hz.addColorStop(0,'rgba(255,240,210,0.6)');hz.addColorStop(1,'rgba(200,180,140,0.1)');
  x.fillStyle=hz;x.fillRect(0,240,1024,28);
  // Ground
  const gr=x.createLinearGradient(0,256,0,512);
  gr.addColorStop(0,'#6a7548');gr.addColorStop(1,'#2a2e1e');
  x.fillStyle=gr;x.fillRect(0,256,1024,256);
  const tex=new THREE.CanvasTexture(c);
  tex.mapping=THREE.EquirectangularReflectionMapping;
  tex.encoding=THREE.sRGBEncoding;
  return tex;
}
const envTex=createEnvTex();
scene.background=envTex;
scene.environment=envTex;

// === Lights ===
scene.add(new THREE.HemisphereLight(0xffffff,0x4a5a3a,0.6));
const sun=new THREE.DirectionalLight(0xfff0d8,0.9);
sun.position.set(180,250,130);
scene.add(sun);

// === Ground ===
scene.add(new THREE.Mesh(
  new THREE.PlaneGeometry(4000,4000),
  new THREE.MeshStandardMaterial({color:0x4e7a3e,roughness:0.95,metalness:0})
).rotateX(-Math.PI/2));

// === Oval Track ===
const STRAIGHT=280;
const RADIUS=90;
const TRACK_WIDTH=14;
const trackControlPoints=[];
// Right straight (heading +Z): x=+RADIUS, z from 0 to STRAIGHT
trackControlPoints.push(new THREE.Vector3(RADIUS,0,0));
trackControlPoints.push(new THREE.Vector3(RADIUS,0,STRAIGHT/3));
trackControlPoints.push(new THREE.Vector3(RADIUS,0,2*STRAIGHT/3));
trackControlPoints.push(new THREE.Vector3(RADIUS,0,STRAIGHT));
// Top semicircle
const nArc=10;
for(let i=1;i<nArc;i++){
  const a=(i/nArc)*Math.PI;
  trackControlPoints.push(new THREE.Vector3(RADIUS*Math.cos(a),0,STRAIGHT+RADIUS*Math.sin(a)));
}
// Left straight (heading -Z): x=-RADIUS, z from STRAIGHT to 0
trackControlPoints.push(new THREE.Vector3(-RADIUS,0,STRAIGHT));
trackControlPoints.push(new THREE.Vector3(-RADIUS,0,2*STRAIGHT/3));
trackControlPoints.push(new THREE.Vector3(-RADIUS,0,STRAIGHT/3));
trackControlPoints.push(new THREE.Vector3(-RADIUS,0,0));
// Bottom semicircle
for(let i=1;i<nArc;i++){
  const a=Math.PI+(i/nArc)*Math.PI;
  trackControlPoints.push(new THREE.Vector3(RADIUS*Math.cos(a),0,RADIUS*Math.sin(a)));
}
const trackCurve=new THREE.CatmullRomCurve3(trackControlPoints,true,'centripetal',0.5);
const trackSegments=400;
const trackPoints=[];
{
  const V=[],I=[],U=[];
  for(let i=0;i<=trackSegments;i++){
    const t=i/trackSegments;
    const p=trackCurve.getPointAt(t);
    const tn=trackCurve.getTangentAt(t);
    const nr=new THREE.Vector3(-tn.z,0,tn.x).normalize();
    const L=p.clone().addScaledVector(nr,TRACK_WIDTH/2);
    const R=p.clone().addScaledVector(nr,-TRACK_WIDTH/2);
    V.push(L.x,0.01,L.z,R.x,0.01,R.z);
    U.push(0,t*60,1,t*60);
    trackPoints.push({center:p,tangent:tn.clone(),normal:nr,left:L,right:R});
  }
  for(let i=0;i<trackSegments;i++){const a=i*2,b=a+1,c=a+2,d=a+3;I.push(a,c,b,b,c,d);}
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(V,3));
  g.setAttribute('uv',new THREE.Float32BufferAttribute(U,2));
  g.setIndex(I);g.computeVertexNormals();
  scene.add(new THREE.Mesh(g,new THREE.MeshStandardMaterial({color:0x2a2a2c,roughness:0.92})));
}
// White edge lines
{
  const vL=[],vR=[];
  for(let i=0;i<=trackSegments;i++){
    const pt=trackPoints[i];
    const L=pt.center.clone().addScaledVector(pt.normal,TRACK_WIDTH/2-0.35);
    const R=pt.center.clone().addScaledVector(pt.normal,-(TRACK_WIDTH/2-0.35));
    vL.push(L.x,0.03,L.z);vR.push(R.x,0.03,R.z);
  }
  const gL=new THREE.BufferGeometry();gL.setAttribute('position',new THREE.Float32BufferAttribute(vL,3));
  const gR=new THREE.BufferGeometry();gR.setAttribute('position',new THREE.Float32BufferAttribute(vR,3));
  const m=new THREE.LineBasicMaterial({color:0xffffff});
  scene.add(new THREE.Line(gL,m));scene.add(new THREE.Line(gR,m));
}
// Red/white kerbs at corners (outer only)
{
  const V=[],C=[],I=[];
  for(let i=0;i<trackSegments;i++){
    const t1=i/trackSegments,t2=((i+3)%trackSegments)/trackSegments;
    const a=trackCurve.getTangentAt(t1),b=trackCurve.getTangentAt(t2);
    if(a.angleTo(b)<0.015)continue;
    const cY=a.z*b.x-a.x*b.z;
    const inside=cY>0?1:-1;
    for(const s of [inside,-inside]){
      const p=trackPoints[i],pn=trackPoints[i+1];
      const C1=p.center.clone().addScaledVector(p.normal,(TRACK_WIDTH/2-0.1)*s);
      const K1=p.center.clone().addScaledVector(p.normal,(TRACK_WIDTH/2+1.0)*s);
      const C2=pn.center.clone().addScaledVector(pn.normal,(TRACK_WIDTH/2-0.1)*s);
      const K2=pn.center.clone().addScaledVector(pn.normal,(TRACK_WIDTH/2+1.0)*s);
      const base=V.length/3;
      V.push(C1.x,0.04,C1.z,K1.x,0.04,K1.z,C2.x,0.04,C2.z,K2.x,0.04,K2.z);
      const red=Math.floor(i/3)%2===0;
      const col=red?[0.82,0.11,0.11]:[1,1,1];
      for(let k=0;k<4;k++)C.push(...col);
      I.push(base,base+1,base+2,base+1,base+3,base+2);
    }
  }
  if(V.length){
    const g=new THREE.BufferGeometry();
    g.setAttribute('position',new THREE.Float32BufferAttribute(V,3));
    g.setAttribute('color',new THREE.Float32BufferAttribute(C,3));
    g.setIndex(I);g.computeVertexNormals();
    scene.add(new THREE.Mesh(g,new THREE.MeshBasicMaterial({vertexColors:true})));
  }
}
// Start/finish checkered line
{
  const c=document.createElement('canvas');c.width=c.height=64;
  const x=c.getContext('2d');
  for(let y=0;y<8;y++)for(let xx=0;xx<8;xx++){x.fillStyle=(xx+y)%2?'#fff':'#000';x.fillRect(xx*8,y*8,8,8);}
  const t=new THREE.CanvasTexture(c);t.magFilter=THREE.NearestFilter;
  const sf=new THREE.Mesh(new THREE.PlaneGeometry(TRACK_WIDTH,3),new THREE.MeshBasicMaterial({map:t}));
  sf.rotation.x=-Math.PI/2;sf.position.set(RADIUS,0.035,0);
  scene.add(sf);
}
// Armco barriers - OUTSIDE only
{
  const wMat=new THREE.MeshStandardMaterial({color:0xeeeeee,roughness:0.5,metalness:0.3});
  const rMat=new THREE.MeshStandardMaterial({color:0xcc2020,roughness:0.6,metalness:0.1});
  const pMat=new THREE.MeshStandardMaterial({color:0x555555,roughness:0.8});
  const step=5;
  for(let i=0;i<trackSegments;i+=step){
    const pt=trackPoints[i],nxt=trackPoints[Math.min(i+step,trackSegments)];
    for(const side of [1,-1]){
      const off=TRACK_WIDTH/2+2.5;
      const p1=pt.center.clone().addScaledVector(pt.normal,off*side);
      const p2=nxt.center.clone().addScaledVector(nxt.normal,off*side);
      const ctr=p1.clone().add(p2).multiplyScalar(0.5);
      const len=p2.clone().sub(p1).length();
      const m=Math.floor(i/step)%4===0?rMat:wMat;
      const bar=new THREE.Mesh(new THREE.BoxGeometry(0.2,0.8,Math.max(0.5,len)),m);
      bar.position.set(ctr.x,0.4,ctr.z);bar.lookAt(p2.x,0.4,p2.z);
      scene.add(bar);
      const post=new THREE.Mesh(new THREE.BoxGeometry(0.18,0.95,0.18),pMat);
      post.position.set(p1.x,0.47,p1.z);scene.add(post);
    }
  }
}
// Crowd texture
function crowdTex(){
  const c=document.createElement('canvas');c.width=256;c.height=64;
  const x=c.getContext('2d');x.fillStyle='#505050';x.fillRect(0,0,256,64);
  const cols=['#2e5a86','#9e2b2b','#c8a836','#6a7d88','#3a3a6a','#a87d4c','#5a5a5a'];
  for(let i=0;i<400;i++){x.fillStyle=cols[Math.floor(Math.random()*cols.length)];x.fillRect(Math.random()*256,Math.random()*64,3+Math.random()*3,3+Math.random()*3);}
  const t=new THREE.CanvasTexture(c);t.wrapS=t.wrapT=THREE.RepeatWrapping;
  return t;
}
const crowdT=crowdTex();
// Grandstands - placed clearly OUTSIDE barriers
function buildGrandstand(w,h){
  const g=new THREE.Group();
  const dpt=h*1.4;
  const tex=crowdT.clone();tex.needsUpdate=true;
  tex.repeat.set(Math.max(2,w/5),Math.max(2,h/2));
  const cm=new THREE.MeshStandardMaterial({map:tex,roughness:0.9,side:THREE.DoubleSide});
  const cr=new THREE.Mesh(new THREE.PlaneGeometry(w,Math.sqrt(h*h+dpt*dpt)),cm);
  const ang=Math.atan2(h,dpt);
  cr.rotation.x=-ang-Math.PI/2;
  cr.position.set(0,h/2,-dpt/2+0.1);
  g.add(cr);
  const sm=new THREE.MeshStandardMaterial({color:0xdddddd,roughness:0.7});
  const bk=new THREE.Mesh(new THREE.BoxGeometry(w,h+0.5,0.4),sm);
  bk.position.set(0,(h+0.5)/2,0.3);g.add(bk);
  const cc=Math.max(3,Math.floor(w/8));
  for(let i=0;i<=cc;i++){
    const col=new THREE.Mesh(new THREE.BoxGeometry(0.35,h+2,0.35),sm);
    col.position.set(-w/2+(w*i/cc),(h+2)/2,0.3);g.add(col);
  }
  const rf=new THREE.Mesh(new THREE.BoxGeometry(w+1,0.3,dpt+1.5),new THREE.MeshStandardMaterial({color:0x4a4a4e,roughness:0.7}));
  rf.position.set(0,h+2,-dpt/2+0.5);g.add(rf);
  return g;
}
function placeGrandstand(tIdx,w,h,sign){
  const pt=trackPoints[tIdx];
  const so=TRACK_WIDTH/2+16;
  const pos=pt.center.clone().addScaledVector(pt.normal,so*sign);
  const gs=buildGrandstand(w,h);
  gs.position.set(pos.x,0,pos.z);
  const to=pt.center.clone().sub(pos);
  gs.rotation.y=Math.atan2(to.x,to.z);
  scene.add(gs);
}
// Grandstands on back straight (opposite side from start)
placeGrandstand(190,50,10,1);  // Main grandstand on back straight
placeGrandstand(230,35,7,1);
placeGrandstand(20,40,8,1);    // Right straight start area
placeGrandstand(60,30,6,1);
// Trees further out
{
  const trG=new THREE.CylinderGeometry(0.25,0.35,1.6,6);
  const tpG=new THREE.ConeGeometry(1.8,3.4,8);
  const tM=new THREE.MeshStandardMaterial({color:0x4a3526,roughness:0.95});
  const lM=new THREE.MeshStandardMaterial({color:0x2c5a2c,roughness:0.9});
  for(let i=0;i<trackPoints.length;i+=6){
    const pt=trackPoints[i];
    for(const side of [1,-1]){
      if(Math.random()<0.7){
        const off=40+Math.random()*40;
        const jt=(Math.random()-0.5)*12;
        const ps=pt.center.clone().addScaledVector(pt.normal,off*side);
        ps.x+=pt.tangent.x*jt;ps.z+=pt.tangent.z*jt;
        const g=new THREE.Group();
        const tr=new THREE.Mesh(trG,tM);tr.position.y=0.8;g.add(tr);
        const tp=new THREE.Mesh(tpG,lM);tp.position.y=3.2;g.add(tp);
        g.position.set(ps.x,0,ps.z);g.rotation.y=Math.random()*Math.PI;
        const s=0.85+Math.random()*0.6;g.scale.set(s,s,s);
        scene.add(g);
      }
    }
  }
}

// === Detailed Porsche-style car ===
function buildDetailedCar(color=0x050505,isPlayer=false){
  const g=new THREE.Group();

  // Materials - PBR
  const paintMat=new THREE.MeshStandardMaterial({color,metalness:0.55,roughness:0.18,envMapIntensity:1.3});
  const plasticMat=new THREE.MeshStandardMaterial({color:0x0a0a0a,metalness:0.1,roughness:0.8});
  const glassMat=new THREE.MeshPhysicalMaterial?new THREE.MeshPhysicalMaterial({color:0x0a0e14,metalness:0.1,roughness:0.05,transmission:0,opacity:0.5,transparent:true,envMapIntensity:1.5}):new THREE.MeshStandardMaterial({color:0x0a0e14,metalness:0.3,roughness:0.08,transparent:true,opacity:0.6,envMapIntensity:1.5});
  const rimMat=new THREE.MeshStandardMaterial({color:0x4e4e52,metalness:0.85,roughness:0.32});
  const tireMat=new THREE.MeshStandardMaterial({color:0x0f0f0f,roughness:0.95,metalness:0});
  const discMat=new THREE.MeshStandardMaterial({color:0xbbbbbb,metalness:0.9,roughness:0.35});
